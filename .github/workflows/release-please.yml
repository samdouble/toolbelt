name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.PAT }}
          release-type: rust
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master
