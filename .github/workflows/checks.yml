name: Checks

on: [pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.97'
      - name: Lint
        run: |
          rustup update
          rustup component add clippy
          cargo clippy
      - name: Audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - name: Build
        run: |
          cargo build
      - name: Test
        run: |
          cargo test
